<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ENGIE Training Simulator</title>

<link rel="stylesheet" href="styles.css">

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>
  
<!-- LOGIN -->

<section id="login-screen">

    <div class="login-card">

        <div class="logo">
            ENGIE Training
        </div>

        <h1>Training Simulator</h1>

        <input
            id="userName"
            type="text"
            placeholder="Nombre del colaborador">

        <div class="login-buttons">

            <button
                class="btn-primary"
                onclick="login('advisor')">

                Entrar como Asesor

            </button>

            <button
                class="btn-secondary"
                onclick="login('trainer')">

                Entrar como Formador

            </button>

        </div>

    </div>

</section>

<!-- DASHBOARD -->

<section
    id="dashboard"
    style="display:none;">

    <!-- Barra superior -->

    <header class="topbar">

        <div class="top-left">

            <button class="menu-btn">

                <i class="fa-solid fa-bars"></i>

            </button>

            <div class="brand">

                Training CX

            </div>

            <div class="search-box">

                <i class="fa-solid fa-magnifying-glass"></i>

                <input
                    type="text"
                    placeholder="Buscar...">

            </div>

        </div>

        <div class="top-right">

            <button><i class="fa-solid fa-phone"></i></button>

            <button><i class="fa-regular fa-comments"></i></button>

            <button><i class="fa-solid fa-inbox"></i></button>

            <button><i class="fa-solid fa-users"></i></button>

            <select id="status">

                <option>Fuera de la cola</option>
                <option>Disponible</option>
                <option>Ocupado</option>
                <option>Ausente</option>
                <option>Descanso</option>

            </select>

            <div class="avatar">

                JV

            </div>

        </div>

    </header>

    <!-- Área principal -->

    <main class="workspace">

        <aside class="sidebar">

        </aside>

        <section class="conversation-list">

        </section>

        <section class="chat-panel">

        </section>

        <aside class="profile-panel">

        </aside>

    </main>

</section>

<script src="firebase.js"></script>
<script src="app.js"></script>

</body>

</html>
